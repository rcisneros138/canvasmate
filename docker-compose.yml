services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - canvasmate-data:/app/data
    environment:
      - SIGNAL_API_URL=http://signal:8080
    depends_on:
      - signal

  signal:
    image: bbernhard/signal-cli-rest-api:latest
    ports:
      - "8080:8080"
    volumes:
      - signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc

volumes:
  canvasmate-data:
  signal-data:
